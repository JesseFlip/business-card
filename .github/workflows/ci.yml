name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Lint HTML
        run: npm run lint:html

      - name: Check JS syntax
        run: npm run lint:js

      - name: Smoke test server
        run: |
          npm start &
          SERVER_PID=$!
          for i in {1..20}; do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:3000/api/health | grep -q '"status":"ok"'
          curl -fsSI http://localhost:3000/ | grep -qi '^HTTP/1\.1 200'
          kill $SERVER_PID
